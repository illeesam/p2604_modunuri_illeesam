<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <base href="../" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FAQ — 도움말</title>
    <link rel="stylesheet" href="layout/site.css" />
  </head>
  <body data-page="0400" data-layout-base="layout/">
    <div class="site-shell">
      <div id="slot-top"></div>
      <div class="site-body">
        <aside id="slot-left" class="site-sidebar" aria-label="도움말 메뉴"></aside>
        <main class="site-main">
          <div class="main-inner">
            <section class="page-hero" aria-labelledby="p-title">
              <div class="page-hero-inner">
                <h1 id="p-title">자주 묻는 질문</h1>
              </div>
            </section>

            <div class="card">
              <h3>docs 메뉴에 Markdown 인벤토리가 안 보여요</h3>
              <p style="margin: 0">도움말 개편으로 <strong>docs</strong> 트리는 HTML 도움말(<code>docs/help</code>)만 노출합니다. 이미지 파일은 그대로 폴더에 있습니다.</p>
            </div>
            <div class="card" style="margin-top: 1rem">
              <h3>iframe 안에서 다른 사이트로 링크해도 되나요?</h3>
              <p style="margin: 0">같은 출처(같은 서버)의 상대 경로 링크는 문제없습니다. 외부 URL은 브라우저·CORS 정책에 따릅니다.</p>
            </div>
            <div class="card" style="margin-top: 1rem">
              <h3>모바일에서 사이드바가 접혀요</h3>
              <p style="margin: 0"><code>site.css</code>의 미디어쿼리에서 햄버거 버튼으로 메뉴를 펼치도록 되어 있습니다.</p>
            </div>
          </div>
        </main>
      </div>
      <div id="slot-bottom"></div>
    </div>
    <script src="layout/load-fragments.js"></script>
  </body>
</html>
