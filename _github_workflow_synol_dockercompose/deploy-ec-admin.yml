name: Deploy EcAdminApi to Synology

on:
  push:
    branches: [ main ]
    paths:
      - 'ec_v26/shopjoy_v260406/_apps_be/EcAdminApi/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # ─────────────────────────────────────────
      # [01-01] 소스코드 체크아웃
      # ─────────────────────────────────────────
      - name: "[01-01] 소스코드 체크아웃"
        uses: actions/checkout@v4

      - name: "[01-02] 체크아웃 확인"
        run: |
          echo "======================================"
          echo "[01-02] 체크아웃 완료"
          echo "======================================"
          echo "브랜치    : ${{ github.ref_name }}"
          echo "커밋SHA  : ${{ github.sha }}"
          echo "커밋메시지: ${{ github.event.head_commit.message }}"
          echo "작성자    : ${{ github.actor }}"
          echo "시각      : $(date '+%Y-%m-%d %H:%M:%S')"
          ls -la ec_v26/shopjoy_v260406/_apps_be/EcAdminApi/

      # ─────────────────────────────────────────
      # [02-01] JDK 설정
      # ─────────────────────────────────────────
      - name: "[02-01] JDK 17 설정"
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: "[02-02] Java 버전 확인"
        run: java -version && javac -version

      # ─────────────────────────────────────────
      # [03-01] Gradle 빌드
      # ─────────────────────────────────────────
      - name: "[03-01] Gradle 실행 권한 부여"
        working-directory: ec_v26/shopjoy_v260406/_apps_be/EcAdminApi
        run: chmod +x gradlew

      - name: "[03-02] Gradle 빌드 (테스트 제외)"
        working-directory: ec_v26/shopjoy_v260406/_apps_be/EcAdminApi
        run: |
          echo "[03-02] 시작시각: $(date '+%Y-%m-%d %H:%M:%S')"
          ./gradlew bootJar -x test --no-daemon
          echo "[03-02] 종료시각: $(date '+%Y-%m-%d %H:%M:%S')"

      - name: "[03-03] 빌드 결과물 확인"
        working-directory: ec_v26/shopjoy_v260406/_apps_be/EcAdminApi
        run: |
          ls -lh build/libs/
          JAR_FILE=$(ls build/libs/*.jar | head -1)
          echo "빌드된 JAR: $JAR_FILE ($(du -sh $JAR_FILE | cut -f1))"

      # ─────────────────────────────────────────
      # [04-01] Docker 이미지 빌드
      # ─────────────────────────────────────────
      - name: "[04-01] Docker 이미지 빌드"
        working-directory: ec_v26/shopjoy_v260406/_apps_be/EcAdminApi
        run: |
          echo "[04-01] 시작시각: $(date '+%Y-%m-%d %H:%M:%S')"
          docker build \
            --tag ec-admin-api:latest \
            --tag ec-admin-api:${{ github.sha }} \
            --build-arg BUILD_DATE=$(date '+%Y-%m-%d') \
            --build-arg GIT_COMMIT=${{ github.sha }} \
            .
          echo "[04-01] 종료시각: $(date '+%Y-%m-%d %H:%M:%S')"
          docker images | grep ec-admin-api

      # ─────────────────────────────────────────
      # [05-01] Docker 이미지 압축
      # ─────────────────────────────────────────
      - name: "[05-01] Docker 이미지 tar 압축"
        run: |
          echo "[05-01] 시작시각: $(date '+%Y-%m-%d %H:%M:%S')"
          docker save ec-admin-api:latest | gzip > ec-admin-api.tar.gz
          echo "[05-01] 종료시각: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "[05-01] 압축파일 크기: $(du -sh ec-admin-api.tar.gz | cut -f1)"

      # ─────────────────────────────────────────
      # [06-01] Synology로 이미지 전송
      # ─────────────────────────────────────────
      - name: "[06-01] Synology로 Docker 이미지 전송 (SCP)"
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SYNOLOGY_HOST }}
          port: ${{ secrets.SYNOLOGY_PORT }}
          username: ${{ secrets.SYNOLOGY_USER }}
          password: ${{ secrets.SYNOLOGY_PASSWORD }}
          key: ${{ secrets.SYNOLOGY_SSH_KEY }}
          source: "ec-admin-api.tar.gz"
          target: "/volume1/docker/ec-admin-api/"

      - name: "[06-02] 전송 완료 확인"
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SYNOLOGY_HOST }}
          port: ${{ secrets.SYNOLOGY_PORT }}
          username: ${{ secrets.SYNOLOGY_USER }}
          password: ${{ secrets.SYNOLOGY_PASSWORD }}
          key: ${{ secrets.SYNOLOGY_SSH_KEY }}
          script: |
            echo "======================================"
            echo "[06-02] Synology 전송 파일 확인"
            echo "======================================"
            ls -lh /volume1/docker/ec-admin-api/ec-admin-api.tar.gz
            echo "[06-02] 전송 완료 OK"

      # ─────────────────────────────────────────
      # [07-01] Synology 배포 (docker-compose 방식)
      # ─────────────────────────────────────────
      - name: "[07-01] Synology 컨테이너 배포 (docker-compose)"
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SYNOLOGY_HOST }}
          port: ${{ secrets.SYNOLOGY_PORT }}
          username: ${{ secrets.SYNOLOGY_USER }}
          password: ${{ secrets.SYNOLOGY_PASSWORD }}
          key: ${{ secrets.SYNOLOGY_SSH_KEY }}
          script: |
            echo "======================================"
            echo "[07-01] 배포 시작"
            echo "[07-01] 시각: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "======================================"

            DEPLOY_DIR=/volume1/docker/ec-admin-api
            SW="echo ${{ secrets.SYNOLOGY_PASSWORD }} | sudo -S"

            echo ""
            echo "[07-02] 새 이미지 로드"
            echo "--------------------------------------"
            cd $DEPLOY_DIR
            $SW docker load < ec-admin-api.tar.gz
            echo "[07-02] 이미지 로드 완료"
            $SW docker images | grep ec-admin-api

            echo ""
            echo "[07-03] docker-compose 서비스 업데이트 (ec-admin-api만 재시작)"
            echo "--------------------------------------"
            # DB/Redis는 이미 떠 있으면 유지, API만 재배포
            $SW docker compose -f $DEPLOY_DIR/docker-compose.yml up -d --no-deps --force-recreate ec-admin-api
            echo "[07-03] 컨테이너 재시작 완료"

            echo ""
            echo "[07-04] 전체 서비스 상태 확인"
            echo "--------------------------------------"
            sleep 5
            $SW docker compose -f $DEPLOY_DIR/docker-compose.yml ps

            echo ""
            echo "[07-05] ec-admin-api 초기 로그"
            echo "--------------------------------------"
            $SW docker logs ec_admin_api --tail 30

            echo ""
            echo "[07-06] 임시 파일 정리"
            echo "--------------------------------------"
            rm -f $DEPLOY_DIR/ec-admin-api.tar.gz
            echo "[07-06] 완료"

            echo ""
            echo "======================================"
            echo "[07-07] 배포 완료!"
            echo "[07-07] API URL : http://illeesam.synology.me:31000"
            echo "[07-07] 완료시각: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "======================================"

      # ─────────────────────────────────────────
      # [08-01] 외부 HTTP 접속 테스트
      # ─────────────────────────────────────────
      - name: "[08-01] GitHub Runner → 외부 HTTP 접속 테스트"
        if: always()
        run: |
          echo "============================================================"
          echo "[08-01] GitHub Actions Runner -> 외부 HTTP 테스트"
          echo "============================================================"
          BASE="http://illeesam.synology.me:31000"

          for P in /actuator/health /health /api/health /ping; do
            URL="${BASE}${P}"
            echo "  >> GET $URL"
            HTTP_CODE=$(curl -s -o /tmp/runner_body.txt -w "%{http_code}" \
              --max-time 10 --connect-timeout 5 "$URL" 2>/dev/null)
            CURL_EXIT=$?
            if   [ $CURL_EXIT -eq 0  ]; then echo "     HTTP: $HTTP_CODE"; cat /tmp/runner_body.txt | head -10 | sed 's/^/     /';
            elif [ $CURL_EXIT -eq 7  ]; then echo "     Connection refused (포트포워딩 확인)";
            elif [ $CURL_EXIT -eq 28 ]; then echo "     Timeout";
            else echo "     curl 실패 (exit=$CURL_EXIT)"; fi
            echo ""
          done

          echo "  >> DNS 확인"
          nslookup illeesam.synology.me 2>/dev/null | grep -E "Address|answer" | sed 's/^/    /' || true

      # ─────────────────────────────────────────
      # [09-01] 배포 결과 요약
      # ─────────────────────────────────────────
      - name: "[09-01] 배포 결과 요약"
        if: always()
        run: |
          echo "======================================"
          echo "[09-01] 배포 파이프라인 결과 요약"
          echo "======================================"
          echo "레포    : ${{ github.repository }}"
          echo "브랜치  : ${{ github.ref_name }}"
          echo "커밋SHA : ${{ github.sha }}"
          echo "작성자  : ${{ github.actor }}"
          echo "결과    : ${{ job.status }}"
          echo "완료시각: $(date '+%Y-%m-%d %H:%M:%S')"
          echo "--------------------------------------"
          echo "📦 서비스 구성 (docker-compose)"
          echo "  shopjoy_db      : PostgreSQL 15"
          echo "  shopjoy_redis   : Redis 7"
          echo "  ec_admin_api    : Spring Boot :31000"
          echo "--------------------------------------"
          echo "🌐 접속 URL"
          echo "  API       : http://illeesam.synology.me:31000"
          echo "  헬스체크  : http://illeesam.synology.me:31000/actuator/health"
          echo "======================================"
          echo ""
          echo "📌 Synology SSH 수동 확인 명령어"
          echo "  cd /volume1/docker/ec-admin-api"
          echo "  sudo docker compose ps"
          echo "  sudo docker compose logs -f ec-admin-api"
          echo "  sudo docker compose restart ec-admin-api"
          echo "  sudo docker compose down && sudo docker compose up -d"
          echo "======================================"
