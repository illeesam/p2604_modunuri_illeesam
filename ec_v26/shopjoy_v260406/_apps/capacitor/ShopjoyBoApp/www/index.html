<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src * 'self' data: gap: 'unsafe-inline' 'unsafe-eval'; style-src * 'unsafe-inline'; script-src * 'unsafe-inline' 'unsafe-eval'; img-src * data: blob:; connect-src *; frame-src *;" />
  <title>ShopJoy BO</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #1f2937;
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
    }
    .loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      color: #f3f4f6;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #4b5563;
      border-top-color: #f3f4f6;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!--
    이 index.html 은 capacitor.config.ts 의 server.url 이 비어있을 때만 표시되는 fallback shell 입니다.
    server.url 이 설정되어 있으면 앱은 즉시 외부 URL(local: http://127.0.0.1:5501/bo.html, prod: netlify) 로 이동합니다.
  -->
  <div class="loading">
    <div class="spinner"></div>
    <div>ShopJoy BO 로딩 중…</div>
  </div>

  <!-- 환경 + 로그 유틸 -->
  <script src="env.js"></script>
  <script src="sjLog.js"></script>
  <script>
    (function () {
      if (window.sjLog) {
        sjLog.appStart({ shell: 'fallback index.html (BO)' });
        sjLog.lifecycle('shellReady');
      }
    })();
  </script>
</body>
</html>
