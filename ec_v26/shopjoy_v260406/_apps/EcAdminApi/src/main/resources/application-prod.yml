spring:
  # 운영 환경 — DevTools 는 운영에 절대 들어가면 안 됨. 명시적으로 비활성.
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

  datasource:
    # DB_HOST=(필수) | DB_PORT=(필수) | DB_NAME=postgres | DB_SCHEMA=shopjoy_2604
    # DB_USERNAME=(필수) | DB_PASSWORD=(필수)
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME:postgres}?currentSchema=${DB_SCHEMA:shopjoy_2604}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      connection-timeout: 30000

  jpa:
    hibernate:
      # validate : Entity↔DB 스키마 검증 (불일치 시 기동 실패)
      # none     : 검증 생략 (기동 우선, 실제 SQL 실행 시 에러로 잡힘) ← 임시 사용
      # update   : 누락된 테이블/컬럼 자동 추가 (운영 비권장)
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: shopjoy_2604
        format_sql: false
    open-in-view: false

  sql:
    init:
      mode: never

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  config-location: classpath:mybatis/mybatis-config.xml
  type-aliases-package: com.shopjoy.ecadminapi

server:
  port: 3000

jwt:
  secret: ${JWT_SECRET}
  bo-access-expiry: ${JWT_BO_ACCESS_EXPIRY:900000}      # 15분 accessToken 만료
  fo-access-expiry: ${JWT_FO_ACCESS_EXPIRY:900000}      # 15분 accessToken 만료
  bo-refresh-expiry: ${JWT_BO_REFRESH_EXPIRY:7200000}   # BO 관리자 refreshToken: 2시간 (Sliding)
  fo-refresh-expiry: ${JWT_FO_REFRESH_EXPIRY:1296000000} # FO 회원 refreshToken: 15일 (Sliding)


management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    redis:
      enabled: false   # app.redis.enabled=false 시 연결 없음 → 헬스체크 제외

app:
  license:
    secret: ${LICENSE_SECRET}       # 환경변수 필수
    enabled: ${LICENSE_ENABLED:true}
    output-dir: ${LICENSE_OUTPUT_DIR:./_license-output}

  redis:
    enabled: false            # true 로 변경 시 Redis 활성화
    primary:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000
    # secondary:              # 보조 Redis 노드 (미설정 시 primary fallback)
    #   host: ${REDIS_SECONDARY_HOST:}
    #   port: ${REDIS_SECONDARY_PORT:6379}
    #   password: ${REDIS_SECONDARY_PASSWORD:}
    #   database: 0
    ttl:
      # auth: JWT access-expiry(900s)와 동일
      bo-auth-seconds: 900            # BO 관리자 세션  | 15분
      fo-auth-seconds: 900            # FO 회원 세션    | 15분
      ext-auth-seconds: 900           # EXT 외부 세션   | 15분
      # sy-*: 변경 시 evict() 호출로 즉시 반영 → TTL은 안전망
      sy-code-seconds: 3600           # 공통코드        | 1시간
      sy-menu-seconds: 3600           # 메뉴 구조       | 1시간
      sy-role-seconds: 3600           # 역할 정보       | 1시간
      sy-role-menu-seconds: 3600      # 역할-메뉴 매핑  | 1시간
      sy-prop-seconds: 3600           # 시스템 프로퍼티 | 1시간
      sy-i18n-seconds: 3600           # 다국어 메시지   | 1시간
      # ec-*: 변경 시 evict() 호출 전제, 3600으로 통일
      ec-pd-prod-seconds: 3600        # 상품 정보           | 1시간
      ec-pd-cate-seconds: 3600        # 카테고리 정보       | 1시간
      ec-pd-cate-prod-seconds: 3600   # 카테고리 상품 정보  | 1시간
      ec-pm-prom-seconds: 3600        # 프로모션 정보       | 1시간
      ec-pm-prom-item-seconds: 3600   # 프로모션 항목 정보  | 1시간
      ec-dp-disp-seconds: 3600        # 전시 정보           | 1시간
      ec-dp-disp-item-seconds: 3600   # 전시 항목 정보      | 1시간
  scheduler:
    enabled: true           # prod: 스케줄러 활성
    jenkins:
      enabled: true         # Jenkins 외부 호출 모드 활성. cron 자동 등록 생략
                            # Jenkins Pipeline → POST /api/sch/jenkins/{batchCode}
                            #   Header: X-Jenkins-Token: ${JENKINS_BATCH_TOKEN}
      token: ${JENKINS_BATCH_TOKEN:}  # 환경변수 주입 필수. 빈값이면 토큰 검증 생략(비권장)
      url: ${JENKINS_URL:}            # 앱→Jenkins 역방향 트리거 URL (미사용, 향후 연동)
    allowed-ips: "192.168.1.1^192.168.1.2"  # 스케줄 관리 API 허용 IP (Jenkins 서버 IP 추가 필요)
  error-log:
    db-save: true
    queue-size: 100
  access-log:
    db-save: true
    queue-size: 100
    # filter 예시 ("^" 구분):
    #   "*"                       → 전체 기록
    #   "BO"                      → BO 관리자 전체
    #   "BO^FO^EXT"               → 인증된 모든 AppType
    #   "admin01"                 → 특정 userId만
    #   "admin01^BO"              → 특정 userId + BO 전체
    #   "admin01^member123^BO"    → 특정 userId 두 명 + BO 전체
    filter: "BO"             # prod: BO 관리자만 기록
    max-body-size: 0         # prod: 바디 미수집 (성능/보안)

  # ── 파일 업로드 설정 (prod 프로파일) ─────────────────────────────────
  file:
    allowed-extensions: jpg,jpeg,png,gif,webp,pdf,doc,docx,xls,xlsx,ppt,pptx,txt,zip,mp4,avi,mov,mkv,webm,flv,wmv,m4v
    max-file-size: 10485760
    max-request-size: 52428800
    max-image-size: 5242880
    max-document-size: 20971520
    max-video-size: 104857600
    storage-type: ${STORAGE_TYPE:AWS_S3}

    # AWS S3 설정 (운영 환경)
    aws:
      bucket-name: ${AWS_S3_BUCKET:shopjoy-files-prod}
      region: ${AWS_REGION:ap-northeast-2}
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}
      cdn-url: ${AWS_CLOUDFRONT_URL:https://cdn.shopjoy.com}

    # NCP OBS 설정 (대안)
    ncp:
      bucket-name: ${NCP_BUCKET:shopjoy-files-prod}
      endpoint: ${NCP_ENDPOINT:https://obs.kr-standard.ncrdev.ncloud.com}
      access-key: ${NCP_ACCESS_KEY}
      secret-key: ${NCP_SECRET_KEY}
      cdn-url: ${NCP_CDN_URL:https://cdn-ncp.shopjoy.com}

    cdn-host: ${CDN_HOST:https://cdn.shopjoy.com}
    thumbnail-enabled: true
    thumbnail-sizes: 200x200,400x400,800x800

# ────────────────────────────────────────────
# 로깅 — prod 프로파일
#   레벨 : INFO (logback-spring.xml <springProfile name="prod"> 적용)
#   파일 : logs/ecadminapi.log
# ────────────────────────────────────────────
logging:
  file:
    path: logs
