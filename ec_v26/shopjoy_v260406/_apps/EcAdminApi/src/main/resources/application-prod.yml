spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/postgres?currentSchema=shopjoy_2604
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: shopjoy_2604
        format_sql: false
    open-in-view: false

  sql:
    init:
      mode: never

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  config-location: classpath:mybatis/mybatis-config.xml
  type-aliases-package: com.shopjoy.ecadminapi

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  access-expiry: 900000
  refresh-expiry: 604800000


management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  redis:
    enabled: false            # true 로 변경 시 Redis 활성화
    primary:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000
    # secondary:              # 보조 Redis 노드 (미설정 시 primary fallback)
    #   host: ${REDIS_SECONDARY_HOST:}
    #   port: ${REDIS_SECONDARY_PORT:6379}
    #   password: ${REDIS_SECONDARY_PASSWORD:}
    #   database: 0
    ttl:
      # auth: JWT access-expiry(900s)와 동일
      bo-auth-seconds: 900            # BO 관리자 세션  | 15분
      fo-auth-seconds: 900            # FO 회원 세션    | 15분
      ext-auth-seconds: 900           # EXT 외부 세션   | 15분
      # sy-*: 변경 시 evict() 호출로 즉시 반영 → TTL은 안전망
      sy-code-seconds: 3600           # 공통코드        | 1시간
      sy-menu-seconds: 3600           # 메뉴 구조       | 1시간
      sy-role-seconds: 3600           # 역할 정보       | 1시간
      sy-role-menu-seconds: 3600      # 역할-메뉴 매핑  | 1시간
      sy-prop-seconds: 3600           # 시스템 프로퍼티 | 1시간
      sy-i18n-seconds: 3600           # 다국어 메시지   | 1시간
      # ec-*: 변경 시 evict() 호출 전제, 3600으로 통일
      ec-pd-prod-seconds: 3600        # 상품 정보           | 1시간
      ec-pd-cate-seconds: 3600        # 카테고리 정보       | 1시간
      ec-pd-cate-prod-seconds: 3600   # 카테고리 상품 정보  | 1시간
      ec-pm-prom-seconds: 3600        # 프로모션 정보       | 1시간
      ec-pm-prom-item-seconds: 3600   # 프로모션 항목 정보  | 1시간
      ec-dp-disp-seconds: 3600        # 전시 정보           | 1시간
      ec-dp-disp-item-seconds: 3600   # 전시 항목 정보      | 1시간
  scheduler:
    enabled: true           # prod: 스케줄러 활성
    jenkins:
      enabled: true
    allowed-ips: "192.168.1.1^192.168.1.2"  # "*"=전체허용 | IP지정: "^"구분
  error-log:
    db-save: true
    queue-size: 100
  access-log:
    db-save: true
    queue-size: 100
    # filter 예시 ("^" 구분):
    #   "*"                       → 전체 기록
    #   "BO"                      → BO 관리자 전체
    #   "BO^FO^EXT"               → 인증된 모든 userType
    #   "admin01"                 → 특정 userId만
    #   "admin01^BO"              → 특정 userId + BO 전체
    #   "admin01^member123^BO"    → 특정 userId 두 명 + BO 전체
    filter: "BO"             # prod: BO 관리자만 기록
    max-body-size: 0         # prod: 바디 미수집 (성능/보안)

  # ── 파일 업로드 설정 (prod 프로파일) ─────────────────────────────────
  file:
    # 스토리지 타입: AWS_S3 또는 NCP_OBS (환경변수로 선택 가능)
    # storage-type: ${STORAGE_TYPE:AWS_S3}
    storage-type: AWS_S3  # AWS_S3 또는 NCP_OBS로 변경 가능

    # AWS S3 설정 (운영 환경)
    aws:
      bucket-name: ${AWS_S3_BUCKET:shopjoy-files-prod}
      region: ${AWS_REGION:ap-northeast-2}
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}
      cdn-url: ${AWS_CLOUDFRONT_URL:https://cdn.shopjoy.com}

    # NCP OBS 설정 (대안)
    ncp:
      bucket-name: ${NCP_BUCKET:shopjoy-files-prod}
      endpoint: ${NCP_ENDPOINT:https://obs.kr-standard.ncrdev.ncloud.com}
      access-key: ${NCP_ACCESS_KEY}
      secret-key: ${NCP_SECRET_KEY}
      cdn-url: ${NCP_CDN_URL:https://cdn-ncp.shopjoy.com}

    # CDN 호스트 (운영 환경)
    cdn-host: ${CDN_HOST:https://cdn.shopjoy.com}
    # 썸네일 생성 활성화
    thumbnail-enabled: true
    thumbnail-sizes: 200x200,400x400,800x800
