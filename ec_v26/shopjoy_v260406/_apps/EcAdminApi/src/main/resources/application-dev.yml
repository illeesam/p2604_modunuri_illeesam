spring:
  datasource:
    url: jdbc:postgresql://illeesam.synology.me:17632/postgres?currentSchema=shopjoy_2604
    username: postgres
    password: postgresilleesam
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: shopjoy_2604
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: never

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  config-location: classpath:mybatis/mybatis-config.xml
  type-aliases-package: com.shopjoy.ecadminapi.domain

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: c2hvcGpveTI2MDRBZG1pbkFwaVNlY3JldEtleU11c3RCZTE2MEJpdHNNaW5pbXVt
  access-expiry: 900000
  refresh-expiry: 604800000


management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  scheduler:
    enabled: true           # dev: 스케줄러 활성
    jenkins:
      enabled: false
    allowed-ips: "*"       # "*"=전체허용 | IP지정: "127.0.0.1^10.0.0.1"

# ────────────────────────────────────────────
# 로깅 — dev 프로파일
#   레벨   : DEBUG (logback-spring.xml <springProfile name="local,dev"> 적용)
#   콘솔   : 컬러 + (%파일:%라인) IntelliJ 클릭 링크 → 소스 바로 이동
#   파일   : logs/ecadminapi.log  (50MB 롤링·30일·2GB·gzip)
#   에러   : logs/ecadminapi-error.log (20MB 롤링·90일·500MB·gzip)
#   시작 시: logback statusListener 가 파일 경로를 콘솔에 출력
# ────────────────────────────────────────────
logging:
  file:
    path: logs

app:
  error-log:
    db-save: true
    queue-size: 100
  access-log:
    db-save: true
    queue-size: 100
    # filter 예시 ("^" 구분):
    #   "*"                       → 전체 기록
    #   "BO"                      → BO 관리자 전체
    #   "BO^FO^EXT"               → 인증된 모든 userType
    #   "admin01"                 → 특정 userId만
    #   "admin01^BO"              → 특정 userId + BO 전체
    #   "admin01^member123^BO"    → 특정 userId 두 명 + BO 전체
    filter: "BO^FO^EXT"       # dev: 인증된 모든 유형 기록
    max-body-size: 2000
