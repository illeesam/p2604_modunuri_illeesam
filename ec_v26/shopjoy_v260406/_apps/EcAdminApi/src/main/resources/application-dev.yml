spring:
  datasource:
    # DB_HOST=illeesam.synology.me | DB_PORT=17632 | DB_NAME=postgres | DB_SCHEMA=shopjoy_2604
    # DB_USERNAME=postgres | DB_PASSWORD=(환경변수 필수)
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}?currentSchema=${DB_SCHEMA:public001}&tcpKeepAlives=true&connectTimeout=30
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: true
      connection-test-query: "SELECT 1"

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: shopjoy_2604
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: never

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  config-location: classpath:mybatis/mybatis-config.xml
  type-aliases-package: com.shopjoy.ecadminapi

server:
  port: 3000

jwt:
  secret: c2hvcGpveTI2MDRBZG1pbkFwaVNlY3JldEtleU11c3RCZTE2MEJpdHNNaW5pbXVt
  access-expiry: 900000
  refresh-expiry: 604800000


management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  redis:
    enabled: false            # true 로 변경 시 Redis 활성화
    primary:
      host: localhost
      port: 6379
      password: ""
      database: 0
      timeout: 3000
    # secondary:              # 보조 Redis 노드 (미설정 시 primary fallback)
    #   host: localhost
    #   port: 6380
    #   password: ""
    #   database: 0
    ttl:
      # auth: JWT access-expiry(900s)와 동일
      bo-auth-seconds: 900            # BO 관리자 세션  | 15분
      fo-auth-seconds: 900            # FO 회원 세션    | 15분
      ext-auth-seconds: 900           # EXT 외부 세션   | 15분
      # sy-*: 변경 시 evict() 호출로 즉시 반영 → TTL은 안전망
      sy-code-seconds: 3600           # 공통코드        | 1시간
      sy-menu-seconds: 3600           # 메뉴 구조       | 1시간
      sy-role-seconds: 3600           # 역할 정보       | 1시간
      sy-role-menu-seconds: 3600      # 역할-메뉴 매핑  | 1시간
      sy-prop-seconds: 3600           # 시스템 프로퍼티 | 1시간
      sy-i18n-seconds: 3600           # 다국어 메시지   | 1시간
      # ec-*: 변경 시 evict() 호출 전제, 3600으로 통일
      ec-pd-prod-seconds: 3600        # 상품 정보           | 1시간
      ec-pd-cate-seconds: 3600        # 카테고리 정보       | 1시간
      ec-pd-cate-prod-seconds: 3600   # 카테고리 상품 정보  | 1시간
      ec-pm-prom-seconds: 3600        # 프로모션 정보       | 1시간
      ec-pm-prom-item-seconds: 3600   # 프로모션 항목 정보  | 1시간
      ec-dp-disp-seconds: 3600        # 전시 정보           | 1시간
      ec-dp-disp-item-seconds: 3600   # 전시 항목 정보      | 1시간
  scheduler:
    enabled: true           # 배치 스케줄러 활성 여부. false=앱 기동 시 cron 등록 생략
    jenkins:
      enabled: false        # Jenkins 외부 호출 모드. true=cron 생략, Jenkins가 직접 API 호출
                            # POST /api/sch/jenkins/{batchCode} + Header X-Jenkins-Token
      token: ${JENKINS_TOKEN:dev-batch-jenkins-tk-9f2a4c8e1b7d}   # 환경변수 우선, 미설정 시 기본값 사용
      url: ""               # 앱→Jenkins 역방향 트리거 URL (미사용, 향후 연동 예정)
    allowed-ips: "*"        # 스케줄 관리 API 허용 IP. "*"=전체허용 | "IP1^IP2"=화이트리스트
  error-log:
    db-save: true
    queue-size: 100
  access-log:
    db-save: true
    queue-size: 100
    # filter 예시 ("^" 구분):
    #   "*"                       → 전체 기록
    #   "BO"                      → BO 관리자 전체
    #   "BO^FO^EXT"               → 인증된 모든 userType
    #   "admin01"                 → 특정 userId만
    #   "admin01^BO"              → 특정 userId + BO 전체
    #   "admin01^member123^BO"    → 특정 userId 두 명 + BO 전체
    filter: "BO^FO^EXT"       # dev: 인증된 모든 유형 기록
    max-body-size: 2000

  # ── 파일 업로드 설정 (dev 프로파일) ─────────────────────────────────
  file:
    # 스토리지 타입: LOCAL 또는 AWS_S3 또는 NCP_OBS (dev 환경에서는 LOCAL 권장)
    storage-type: LOCAL
    # 로컬 저장소 경로 (프로젝트 루트 기준)
    local:
      base-path: static/cdn
      upload-dir: uploads
    # CDN 호스트 (dev 서버 URL)
    cdn-host: http://dev.shopjoy.com/static/cdn
    # 썸네일 생성 활성화
    thumbnail-enabled: true
    thumbnail-sizes: 200x200,400x400,800x800

    # AWS S3 설정 (필요 시 storage-type을 AWS_S3로 변경)
    # aws:
    #   bucket-name: shopjoy-files-dev
    #   region: ap-northeast-2
    #   access-key: ${AWS_ACCESS_KEY_ID:}
    #   secret-key: ${AWS_SECRET_ACCESS_KEY:}
    #   cdn-url: https://cdn-dev.shopjoy.com

# ────────────────────────────────────────────
# 로깅 — dev 프로파일
#   레벨   : DEBUG (logback-spring.xml <springProfile name="local,dev"> 적용)
#   콘솔   : 컬러 + (%파일:%라인) IntelliJ 클릭 링크 → 소스 바로 이동
#   파일   : logs/ecadminapi.log  (50MB 롤링·30일·2GB·gzip)
#   에러   : logs/ecadminapi-error.log (20MB 롤링·90일·500MB·gzip)
#   시작 시: logback statusListener 가 파일 경로를 콘솔에 출력
# ────────────────────────────────────────────
logging:
  file:
    path: logs
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
