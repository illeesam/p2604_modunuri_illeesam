spring:
  datasource:
    url: jdbc:postgresql://illeesam.synology.me:17632/postgres?currentSchema=shopjoy_2604
    username: postgres
    password: postgresilleesam
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: shopjoy_2604
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: never

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  config-location: classpath:mybatis/mybatis-config.xml
  type-aliases-package: com.shopjoy.ecadminapi

server:
  port: 3000

jwt:
  secret: c2hvcGpveTI2MDRBZG1pbkFwaVNlY3JldEtleU11c3RCZTE2MEJpdHNNaW5pbXVt
  access-expiry: 900000
  refresh-expiry: 604800000


management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  redis:
    enabled: false
    primary:
      host: localhost
      port: 6379
      password: ""
      database: 0
      timeout: 3000
    ttl:
      bo-auth-seconds: 900
      fo-auth-seconds: 900
      ext-auth-seconds: 900
      sy-code-seconds: 3600
      sy-menu-seconds: 3600
      sy-role-seconds: 3600
      sy-role-menu-seconds: 3600
      sy-prop-seconds: 3600
      sy-i18n-seconds: 3600
      ec-pd-prod-seconds: 3600
      ec-pd-cate-seconds: 3600
      ec-pd-cate-prod-seconds: 3600
      ec-pm-prom-seconds: 3600
      ec-pm-prom-item-seconds: 3600
      ec-dp-disp-seconds: 3600
      ec-dp-disp-item-seconds: 3600
  scheduler:
    enabled: true
    jenkins:
      enabled: false
    allowed-ips: "*"
  error-log:
    db-save: true
    queue-size: 100
  access-log:
    db-save: true
    queue-size: 100
    filter: "BO^FO^EXT"
    max-body-size: 2000

  # ── 파일 업로드 설정 (dev-intellij 프로파일) ─────────────────────────
  file:
    # 스토리지 타입: LOCAL (IntelliJ 디버그용)
    storage-type: LOCAL
    # 로컬 저장소 경로
    local:
      base-path: static/cdn
      upload-dir: uploads
    # CDN 호스트
    cdn-host: http://localhost:8091/static/cdn
    # 썸네일 생성 활성화
    thumbnail-enabled: true
    thumbnail-sizes: 200x200,400x400,800x800

logging:
  file:
    path: logs
