spring:
  datasource:
    # DB_HOST=illeesam.synology.me | DB_PORT=17632 | DB_NAME=postgres | DB_SCHEMA=shopjoy_2604
    # DB_USERNAME=postgres | DB_PASSWORD=(환경변수 필수)
    url: jdbc:postgresql://${DB_HOST:illeesam.synology.me}:${DB_PORT:17632}/${DB_NAME:postgres}?currentSchema=${DB_SCHEMA:shopjoy_2604}&tcpKeepAlives=true&connectTimeout=30
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: true
      connection-test-query: "SELECT 1"

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: shopjoy_2604
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: never

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  config-location: classpath:mybatis/mybatis-config.xml
  type-aliases-package: com.shopjoy.ecadminapi

server:
  port: 3000

jwt:
  secret: c2hvcGpveTI2MDRBZG1pbkFwaVNlY3JldEtleU11c3RCZTE2MEJpdHNNaW5pbXVt
  access-expiry: 900000
  refresh-expiry: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  redis:
    enabled: false            # true 로 변경 시 Redis 활성화
    primary:
      host: localhost
      port: 6379
      password: ""
      database: 0
      timeout: 3000
    ttl:
      bo-auth-seconds: 900            # BO 관리자 세션  | 15분
      fo-auth-seconds: 900            # FO 회원 세션    | 15분
      ext-auth-seconds: 900           # EXT 외부 세션   | 15분
      sy-code-seconds: 3600           # 공통코드        | 1시간
      sy-menu-seconds: 3600           # 메뉴 구조       | 1시간
      sy-role-seconds: 3600           # 역할 정보       | 1시간
      sy-role-menu-seconds: 3600      # 역할-메뉴 매핑  | 1시간
      sy-prop-seconds: 3600           # 시스템 프로퍼티 | 1시간
      sy-i18n-seconds: 3600           # 다국어 메시지   | 1시간
      ec-pd-prod-seconds: 3600        # 상품 정보           | 1시간
      ec-pd-cate-seconds: 3600        # 카테고리 정보       | 1시간
      ec-pd-cate-prod-seconds: 3600   # 카테고리 상품 정보  | 1시간
      ec-pm-prom-seconds: 3600        # 프로모션 정보       | 1시간
      ec-pm-prom-item-seconds: 3600   # 프로모션 항목 정보  | 1시간
      ec-dp-disp-seconds: 3600        # 전시 정보           | 1시간
      ec-dp-disp-item-seconds: 3600   # 전시 항목 정보      | 1시간
  scheduler:
    enabled: true             # IntelliJ 디버그: 스케줄러 활성
    jenkins:
      enabled: false          # Jenkins 외부 호출 모드 비활성. cron 자동 스케줄 사용
      token: ${JENKINS_TOKEN:dev-batch-jenkins-tk-9f2a4c8e1b7d}   # 환경변수 우선, 미설정 시 기본값 사용
      url: ""                 # 앱→Jenkins 역방향 트리거 URL (미사용)
    allowed-ips: "*"          # 전체 IP 허용
  error-log:
    db-save: true
    queue-size: 100
  access-log:
    db-save: true
    queue-size: 100
    filter: "BO^FO^EXT"       # 인증된 모든 유형 기록
    max-body-size: 2000

  # ── 파일 업로드 설정 (dev-intellij 프로파일) ─────────────────────────
  file:
    storage-type: LOCAL
    local:
      base-path: static/cdn
      upload-dir: uploads
    cdn-host: http://localhost:8091/static/cdn
    thumbnail-enabled: true
    thumbnail-sizes: 200x200,400x400,800x800

# ────────────────────────────────────────────
# 로깅 — dev-intellij 프로파일
#   레벨: DEBUG  파일: logs/ecadminapi.log
# ────────────────────────────────────────────
logging:
  file:
    path: logs
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
