spring:
  # spring.mail.* 설정 불필요 — CmMailSendService 가 발송 시점에 sy_prop 에서 직접 읽음

  # ────────────────────────────────────────────────────────────
  # 부팅 시간 단축 — local 전용 (운영은 prod 에서 다시 명시)
  # ────────────────────────────────────────────────────────────
  main:
    lazy-initialization: true        # 빈 지연 초기화 (실제 호출 시점에 생성)
    banner-mode: console             # banner.txt 콘솔 출력 (구동 시간 영향 없음 — ms 미만)
    register-shutdown-hook: false    # ShutdownHook 등록 생략 (DevTools 가 어차피 재시작)

  # JMX 비활성 — local 에서 불필요
  jmx:
    enabled: false

  # 자동 설정 클래스 평가 비활성 — 컨디션 평가 리포트 생성 생략
  output:
    ansi:
      enabled: never                 # ANSI 색상 코드 처리 생략 (logback 컬러는 별도)

  # AOT/네이티브 컴파일 비활성 — 일반 JVM 모드만 사용
  aot:
    enabled: false

  # 자동 설정 제외 — 사용 안 하는 모듈 제거로 부팅 단축
  autoconfigure:
    exclude:
      # 보안 OAuth2 클라이언트 안 씀
      - org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration
      # ElasticSearch 안 씀
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration
      # Quartz 스케줄러 안 씀 (자체 스케줄러 사용)
      - org.springframework.boot.autoconfigure.quartz.QuartzAutoConfiguration
      # MongoDB 안 씀
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration

  # Kotlin/Groovy 메시지 변환기 비활성
  mvc:
    converters:
      preferred-json-mapper: jackson

  # DevTools — hot-reload. poll 5s / quiet 3s (일괄 수정 중 단편 reload 방지)
  devtools:
    restart:
      enabled: true
      poll-interval: 5s              # 변경 폴링 간격 (기본 1s → 5s 로 완화)
      quiet-period: 3s               # 변경 감지 후 안정화 대기 (기본 400ms → 3s)
      # 재기동 무관 리소스 — watch 제외
      additional-exclude: >
        static/**,public/**,templates/**,
        **/*.md,**/*.txt,**/*.html,**/*.sql,
        **/*.json,**/*.properties,
        logs/**,**/.gitignore
      # 명시적 재시작 모드 (자동 재시작 부담 시 활성화 — .reloadtrigger touch 시에만 재기동)
      # trigger-file: .reloadtrigger
    livereload:
      enabled: true

  datasource:
    # DB_HOST=localhost | DB_PORT=5432 | DB_NAME=postgres | DB_SCHEMA=shopjoy_2604
    # DB_USERNAME=postgres | DB_PASSWORD=postgres
    url: jdbc:p6spy:postgresql://${DB_HOST:illeesam.synology.me}:${DB_PORT:17632}/${DB_NAME:postgres}?currentSchema=${DB_SCHEMA:shopjoy_2604}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgresilleesam}
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1                # 최소 idle 1개만 부팅 시 생성 (기본=poolSize)
      connection-timeout: 10000      # 30s → 10s (실패 빨리 감지)
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: true
      # connection-test-query 제거 — JDBC4 isValid() 자동 사용 (RT 단축)
      initialization-fail-timeout: -1  # 부팅 시 DB 미연결 허용 (네트워크 지연 흡수)
      register-mbeans: false         # JMX 등록 생략

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false   # p6spy 사용 중 — hibernate show-sql 중복 출력 방지
    database-platform: org.hibernate.dialect.PostgreSQLDialect   # dialect 명시 — 자동 감지 시 메타조회 발생
    properties:
      hibernate:
        default_schema: shopjoy_2604
        format_sql: true
        use_sql_comments: true   # JPAQuery setHint("org.hibernate.comment", ...) 로 SQL 헤더에 /* 주석 */ 출력 활성
        # 부팅 시간 단축 옵션 — dialect 명시했으므로 메타조회 생략 가능
        boot:
          allow_jdbc_metadata_access: false   # JDBC 메타데이터 조회 생략 (부팅 1~2초 단축)
        temp:
          use_jdbc_metadata_defaults: false   # JDBC 기본값 자동 탐지 생략
        jdbc:
          lob:
            non_contextual_creation: true     # LOB 컨텍스트 검사 생략
        query:
          plan_cache_max_size: 1024            # 쿼리 플랜 캐시
    open-in-view: false
    defer-datasource-initialization: false   # 데이터 초기화 sql 비활성

  sql:
    init:
      mode: never

  flyway:
    baseline-on-migrate: true
    baseline-version: 0

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  config-location: classpath:mybatis/mybatis-config.xml
  type-aliases-package: com.shopjoy.ecadminapi

server:
  port: 3000
  # Tomcat 부팅 단축
  tomcat:
    threads:
      min-spare: 5                   # 시작 시 미리 생성하는 스레드 수 (기본 10 → 5)
      max: 100                       # 최대 (기본 200 → 100, local 부하 적음)
    accept-count: 50                 # 대기 큐 (기본 100 → 50)
  # 압축은 local 에서 불필요 (네트워크 latency 무관)
  compression:
    enabled: false

management:
  endpoints:
    enabled-by-default: false        # local: actuator 엔드포인트 전체 비활성 (기본 활성 → 비활성)
    web:
      exposure:
        include: ""
  health:
    redis:
      enabled: false   # app.redis.enabled=false 시 연결 없음 → 헬스체크 제외
    db:
      enabled: false                 # local: DB 헬스체크 끄기 (이미 부팅 시 1회 검증)
    diskspace:
      enabled: false                 # local: 디스크 헬스체크 무의미

app:
  auth:
    jwt:
      secret: ${JWT_SECRET:c2hvcGpveTI2MDRBZG1pbkFwaVNlY3JldEtleU11c3RCZTE2MEJpdHNNaW5pbXVt}
      bo-access-expiry: ${JWT_BO_ACCESS_EXPIRY:604800000}    # 7일  accessToken  만료 (local)
      fo-access-expiry: ${JWT_FO_ACCESS_EXPIRY:604800000}    # 7일  accessToken  만료 (local)
      bo-refresh-expiry: ${JWT_BO_REFRESH_EXPIRY:2592000000} # 30일 refreshToken 만료 (local, Sliding)
      fo-refresh-expiry: ${JWT_FO_REFRESH_EXPIRY:2592000000} # 30일 refreshToken 만료 (local, Sliding)

  # app.mail.from / from-nm 은 sy_prop(app.mail.*) 에서 주입
  # app.license.secret / enabled 는 sy_prop(app.license.*) 에서 주입

  redis:
    enabled: false            # true 로 변경 시 Redis 활성화
    primary:
      host: localhost
      port: 6379
      password: ""
      database: 0
      timeout: 3000
    # secondary:              # 보조 Redis 노드 (미설정 시 primary fallback)
    #   host: localhost
    #   port: 6380
    #   password: ""
    #   database: 0
    ttl:
      # auth: JWT access-expiry(900s)와 동일
      bo-auth-seconds: 900            # BO 관리자 세션  | 15분
      fo-auth-seconds: 900            # FO 회원 세션    | 15분
      ext-auth-seconds: 900           # EXT 외부 세션   | 15분
      # sy-*: 변경 시 evict() 호출로 즉시 반영 → TTL은 안전망
      sy-code-seconds: 3600           # 공통코드        | 1시간
      sy-menu-seconds: 3600           # 메뉴 구조       | 1시간
      sy-role-seconds: 3600           # 역할 정보       | 1시간
      sy-role-menu-seconds: 3600      # 역할-메뉴 매핑  | 1시간
      sy-prop-seconds: 3600           # 시스템 프로퍼티 | 1시간
      sy-i18n-seconds: 3600           # 다국어 메시지   | 1시간
      # ec-*: 변경 시 evict() 호출 전제, 3600으로 통일
      ec-pd-prod-seconds: 3600        # 상품 정보           | 1시간
      ec-pd-cate-seconds: 3600        # 카테고리 정보       | 1시간
      ec-pd-cate-prod-seconds: 3600   # 카테고리 상품 정보  | 1시간
      ec-pm-prom-seconds: 3600        # 프로모션 정보       | 1시간
      ec-pm-prom-item-seconds: 3600   # 프로모션 항목 정보  | 1시간
      ec-dp-disp-seconds: 3600        # 전시 정보           | 1시간
      ec-dp-disp-item-seconds: 3600   # 전시 항목 정보      | 1시간
  scheduler:
    enabled: false          # 로컬 환경: 스케줄러 비활성 (cron 자동 실행 없음)
    jenkins:
      enabled: false        # Jenkins 외부 호출 모드 비활성. /api/sch/jenkins/* → 403
      token: ""             # Jenkins 인증 토큰 (local은 jenkins.enabled=false라 미사용)
      url: ""               # 앱→Jenkins 역방향 트리거 URL (미사용)
    allowed-ips: ""         # 빈값=전체허용 | "*"=전체허용 | "127.0.0.1^10.0.0.1"=IP지정
  error-log:
    db-save: true             # true=DB저장 | false=파일만 기록(DB저장 생략)
    queue-size: 100           # 초과 시 즉시 드롭
  access-log:
    db-save: true             # true=DB저장 | false=필터 동작하나 DB저장 생략(설정 테스트 시)
    queue-size: 100
    filter: "*"               # *=전체 | BO=관리자 | BO^FO^EXT | userId^BO
    max-body-size: 2000       # 요청/응답 바디 최대 저장 크기(bytes). 0=미수집

  # ── 파일 업로드 설정 (local 프로파일) ─────────────────────────────────
  # storage-type / cdn-host / aws.* / ncp.* 는 sy_prop(app.file.*) 에서 주입
  file:
    allowed-extensions: jpg,jpeg,png,gif,webp,pdf,doc,docx,xls,xlsx,ppt,pptx,txt,zip,mp4,avi,mov,mkv,webm,flv,wmv,m4v
    max-file-size: 10485760
    max-request-size: 52428800
    max-image-size: 5242880
    max-document-size: 20971520
    max-video-size: 104857600
    local:
      physical-root: src/main/resources/static/cdn
      base-path: attach
      upload-dir: uploads
    thumbnail-enabled: true
    thumbnail-sizes: 200x200,400x400,800x800

# ────────────────────────────────────────────
# 로깅 — local 프로파일
#   레벨   : DEBUG (logback-spring.xml <springProfile name="local,dev"> 적용)
#   콘솔   : 컬러 + (%파일:%라인) IntelliJ 클릭 링크 → 소스 바로 이동
#   파일   : logs/ecadminapi.log  (50MB 롤링·30일·2GB·gzip)
#   에러   : logs/ecadminapi-error.log (20MB 롤링·90일·500MB·gzip)
#   시작 시: logback statusListener 가 파일 경로를 콘솔에 출력
# ────────────────────────────────────────────
logging:
  file:
    # ⚠ 워크스페이스 밖 절대경로 — VSCode Live Server reload 무한 루프 회피
    #   자세히: _doc/정책서-dev/local-logging.md
    path: C:/_logs/shopjoy
