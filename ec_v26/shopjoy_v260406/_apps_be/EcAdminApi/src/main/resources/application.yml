# application.yml — 공통 설정 / 프로파일별: application-{local|dev|prod}.yml
# ⚠️ 아래 항목은 sy_prop DB 에서 관리 (BO → 시스템 → 프로퍼티 관리):
#    auth.social / toss / map / app.ext-sdk
#    spring.mail.host/port/username/password / app.mail.*
#    app.file.storage-type / cdn-host / aws.bucket/region/cdn-url / ncp.bucket/endpoint/cdn-url
#    app.license.secret(local/dev) / app.license.enabled

spring:
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

app:
  # license.secret / license.enabled 는 sy_prop(app.license.*) 에서 주입
  license:
    output-dir: ${LICENSE_OUTPUT_DIR:./_license-output}

# 마스터 패스워드 — 개발 전용, prod=false 필수
auth:
  master-pwd:
    enabled: ${AUTH_MASTER_PWD_ENABLED:true}
    hash:    ${AUTH_MASTER_PWD_HASH:0ffe1abd1a08215353c233d6e009613e95eec4253832a761af28ff37ac5a150c}

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

logging:
  config: classpath:logback-spring.xml
  file:
    path: logs
