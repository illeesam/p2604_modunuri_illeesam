name: shopjoy_fo_app
description: ShopJoy FO Mobile App (Flutter) — 사용자(고객)용
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # WebView
  webview_flutter: ^4.10.0
  webview_flutter_android: ^3.16.7
  webview_flutter_wkwebview: ^3.16.0

  # 푸시 (FCM) — 사용 시 활성화
  # firebase_core: ^3.6.0
  # firebase_messaging: ^15.1.3

  # 결제 InAppBrowser (외부 결제창)
  url_launcher: ^6.3.1

  # 보안 스토리지 (localStorage 대체)
  flutter_secure_storage: ^9.2.2

  # 권한 처리
  permission_handler: ^11.3.1

  # 딥링크
  app_links: ^6.3.2

  # 환경 분기 보조
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env.local
    - .env.dev
    - .env.prod
