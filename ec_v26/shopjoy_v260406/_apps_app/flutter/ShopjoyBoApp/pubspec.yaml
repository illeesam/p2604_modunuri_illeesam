name: shopjoy_bo_app
description: ShopJoy BO Mobile App (Flutter) — 관리자(운영자)용
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  webview_flutter: ^4.10.0
  webview_flutter_android: ^3.16.7
  webview_flutter_wkwebview: ^3.16.0

  url_launcher: ^6.3.1
  flutter_secure_storage: ^9.2.2
  permission_handler: ^11.3.1
  app_links: ^6.3.2
  flutter_dotenv: ^5.2.1

  # 생체인증 (관리자 빠른 로그인)
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env.local
    - .env.dev
    - .env.prod
