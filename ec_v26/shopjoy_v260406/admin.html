<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopJoy Admin</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap">
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f2f5; color: #222; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; }

    .admin-wrap { padding: 20px; max-width: 1400px; margin: 0 auto; }
    .page-title { font-size: 20px; font-weight: 700; margin-bottom: 18px; color: #1a1a2e; }

    .card { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.08); padding: 20px; margin-bottom: 16px; }

    .search-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .search-bar input, .search-bar select { padding: 7px 11px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 13px; }
    .search-bar input { min-width: 200px; }

    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }

    .btn { display: inline-flex; align-items: center; gap: 4px; padding: 7px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn-primary   { background: #e8587a; color: #fff; }
    .btn-secondary { background: #fff; color: #444; border: 1px solid #d9d9d9; }
    .btn-blue      { background: #1677ff; color: #fff; }
    .btn-green     { background: #52c41a; color: #fff; }
    .btn-danger    { background: #ff4d4f; color: #fff; }
    .btn-sm        { padding: 4px 10px; font-size: 12px; }

    .admin-table { width: 100%; border-collapse: collapse; }
    .admin-table th { background: #fafafa; padding: 10px 12px; text-align: left; font-size: 12px; font-weight: 600; color: #555; border-bottom: 1px solid #e8e8e8; white-space: nowrap; }
    .admin-table td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    .admin-table tr:hover td { background: #fafbff; }
    .admin-table .actions { display: flex; gap: 4px; justify-content: flex-end; }
    .title-link { color: #1677ff; cursor: pointer; font-weight: 500; }
    .title-link:hover { text-decoration: underline; }

    .pagination { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; }
    .pagination .total-label { font-size: 13px; color: #666; }
    .pager { display: flex; gap: 3px; align-items: center; }
    .pager button { min-width: 30px; height: 30px; border: 1px solid #d9d9d9; background: #fff; border-radius: 5px; cursor: pointer; font-size: 13px; }
    .pager button.active { background: #e8587a; color: #fff; border-color: #e8587a; font-weight: 700; }
    .pager button:disabled { opacity: .4; cursor: default; }
    .size-select { padding: 4px 8px; border: 1px solid #d9d9d9; border-radius: 5px; font-size: 12px; }

    .form-group { margin-bottom: 14px; }
    .form-label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: 500; color: #444; }
    .form-label .req { color: #e8587a; margin-left: 2px; }
    .form-control { width: 100%; padding: 8px 11px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 13px; background: #fff; }
    .form-control:focus { outline: none; border-color: #e8587a; box-shadow: 0 0 0 2px rgba(232,88,122,.1); }
    textarea.form-control { resize: vertical; min-height: 80px; font-family: inherit; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-row.col3 { grid-template-columns: 1fr 1fr 1fr; }
    .form-actions { display: flex; gap: 8px; margin-top: 20px; }
    .section-title { font-size: 13px; font-weight: 700; color: #444; margin: 18px 0 10px; padding-bottom: 6px; border-bottom: 2px solid #e8587a; }
    .readonly-field { padding: 8px 11px; background: #f5f5f5; border: 1px solid #e8e8e8; border-radius: 6px; font-size: 13px; color: #666; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .badge-blue   { background: #e6f4ff; color: #1677ff; }
    .badge-green  { background: #f6ffed; color: #389e0d; }
    .badge-red    { background: #fff1f0; color: #cf1322; }
    .badge-gray   { background: #f5f5f5; color: #8c8c8c; }
    .badge-orange { background: #fff7e6; color: #d46b08; }
    .badge-purple { background: #f9f0ff; color: #722ed1; }
    .badge-pink   { background: #fff0f6; color: #c41d7f; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal-box { background: #fff; border-radius: 12px; padding: 24px; width: 100%; max-width: 580px; max-height: 85vh; overflow-y: auto; }
    .modal-box.wide { max-width: 820px; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-close { cursor: pointer; font-size: 22px; color: #aaa; line-height: 1; }
    .modal-close:hover { color: #555; }
    .detail-row { display: flex; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
    .detail-label { width: 120px; flex-shrink: 0; font-size: 12px; color: #888; padding-top: 1px; }
    .detail-value { flex: 1; font-size: 13px; color: #222; word-break: break-all; }
    .ref-link { color: #e8587a; cursor: pointer; font-size: 12px; text-decoration: underline; margin-left: 4px; }

    .toast-wrap { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: rgba(30,30,30,.92); color: #fff; padding: 11px 22px; border-radius: 8px; z-index: 9999; font-size: 13px; box-shadow: 0 4px 12px rgba(0,0,0,.2); white-space: nowrap; }

    .tag { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; background: #f0f0f0; color: #555; margin: 1px; }

    .chat-messages { max-height: 320px; overflow-y: auto; border: 1px solid #f0f0f0; border-radius: 8px; padding: 12px; background: #fafafa; display: flex; flex-direction: column; gap: 8px; }
    .chat-msg { max-width: 70%; }
    .chat-msg.user { align-self: flex-end; }
    .chat-msg.cs   { align-self: flex-start; }
    .chat-bubble { padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.5; }
    .chat-msg.user .chat-bubble { background: #e8587a; color: #fff; border-bottom-right-radius: 3px; }
    .chat-msg.cs   .chat-bubble { background: #fff; border: 1px solid #e8e8e8; color: #222; border-bottom-left-radius: 3px; }
    .chat-time { font-size: 11px; color: #aaa; margin-top: 3px; }
    .chat-msg.user .chat-time { text-align: right; }

    .ql-container { min-height: 120px; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; }
    .quill-wrap { border: 1px solid #d9d9d9; border-radius: 6px; overflow: hidden; }
    .quill-wrap .ql-toolbar { border: none; border-bottom: 1px solid #d9d9d9; background: #fafafa; }
    .quill-wrap .ql-container { border: none; }

    .widget-card { border: 1px solid #e8e8e8; border-radius: 8px; padding: 14px; background: #fff; }
    .widget-card .widget-type { font-size: 11px; color: #1677ff; font-weight: 600; margin-bottom: 4px; }
    .widget-card .widget-name { font-size: 14px; font-weight: 600; margin-bottom: 6px; }

    .confirm-box { background: #fff; border-radius: 12px; padding: 28px 24px; max-width: 380px; width: 90%; text-align: center; }
    .confirm-icon { font-size: 34px; margin-bottom: 10px; }
    .confirm-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .confirm-msg { font-size: 13px; color: #666; margin-bottom: 20px; white-space: pre-line; }
    .confirm-actions { display: flex; gap: 10px; justify-content: center; }

    .admin-nav { background: #1a1a2e; color: #fff; padding: 0 20px; display: flex; align-items: center; height: 50px; gap: 16px; position: sticky; top: 0; z-index: 100; }
    .admin-nav .brand { font-size: 16px; font-weight: 700; color: #e8587a; cursor: pointer; flex-shrink: 0; }
    .admin-nav .nav-links { display: flex; gap: 2px; overflow-x: auto; flex: 1; }
    .admin-nav .nav-link { padding: 5px 10px; border-radius: 5px; font-size: 12px; color: #ccc; cursor: pointer; white-space: nowrap; }
    .admin-nav .nav-link:hover, .admin-nav .nav-link.active { background: rgba(255,255,255,.15); color: #fff; }

    .popup-prod-list { max-height: 280px; overflow-y: auto; }
    .popup-prod-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 6px; cursor: pointer; }
    .popup-prod-item:hover { background: #f5f5f5; }

    /* ── Tab ── */
    .tab-nav { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid #e8e8e8; }
    .tab-btn { padding: 9px 18px; border: none; background: none; cursor: pointer; font-size: 13px; font-weight: 500; color: #888; border-bottom: 2px solid transparent; margin-bottom: -2px; white-space: nowrap; transition: color .15s; }
    .tab-btn:hover { color: #555; }
    .tab-btn.active { color: #e8587a; border-bottom-color: #e8587a; font-weight: 700; }
    .tab-count { display: inline-block; background: #f0f0f0; color: #888; font-size: 11px; padding: 1px 6px; border-radius: 8px; margin-left: 4px; }
    .tab-btn.active .tab-count { background: #fde8ee; color: #e8587a; }

    @media (max-width: 640px) {
      .form-row, .form-row.col3 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="pages/admin/AdminData.js"></script>
  <script src="pages/admin/AdminModals.js"></script>
  <script src="pages/admin/MemberMng.js"></script>
  <script src="pages/admin/MemberDtl.js"></script>
  <script src="pages/admin/ProdMng.js"></script>
  <script src="pages/admin/ProdDtl.js"></script>
  <script src="pages/admin/OrderMng.js"></script>
  <script src="pages/admin/OrderDtl.js"></script>
  <script src="pages/admin/ClaimMng.js"></script>
  <script src="pages/admin/ClaimDtl.js"></script>
  <script src="pages/admin/DlivMng.js"></script>
  <script src="pages/admin/DlivDtl.js"></script>
  <script src="pages/admin/CouponMng.js"></script>
  <script src="pages/admin/CouponDtl.js"></script>
  <script src="pages/admin/CacheMng.js"></script>
  <script src="pages/admin/CacheDtl.js"></script>
  <script src="pages/admin/DispMng.js"></script>
  <script src="pages/admin/DispDtl.js"></script>
  <script src="pages/admin/EventMng.js"></script>
  <script src="pages/admin/EventDtl.js"></script>
  <script src="pages/admin/ContactMng.js"></script>
  <script src="pages/admin/ContactDtl.js"></script>
  <script src="pages/admin/ChattMng.js"></script>
  <script src="pages/admin/ChattDtl.js"></script>
  <script src="components/widgets/DispWidget.js"></script>
  <script src="components/panels/DispPanel.js"></script>
  <script src="pages/admin/AdminApp.js"></script>
</body>
</html>
