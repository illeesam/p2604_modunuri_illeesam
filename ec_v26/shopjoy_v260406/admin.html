  <script>
    /* ═══════════════════════════════════════════════════════════════════
       사이트 기본값 설정 (변경 시 이 한 줄만 수정)
       ═══════════════════════════════════════════════════════════════════ */
    const DEFAULT_ADMIN_SITE_NO = '01';
    /* ADMIN_SITE_NO — URL ?ADMIN_SITE_NO=02 로 오버라이드 가능, localStorage 영속 */
    (function(){
      try {
        var qs = new URLSearchParams(window.location.search);
        var v = qs.get('ADMIN_SITE_NO');
        if (v) {
          window.ADMIN_SITE_NO = v;
          try { localStorage.setItem('modu-admin-site_no', v); } catch(_){}
          try {
            qs.delete('ADMIN_SITE_NO');
            var newSearch = qs.toString();
            history.replaceState(null, '', window.location.pathname + (newSearch ? '?' + newSearch : '') + window.location.hash);
          } catch(_){}
        } else {
          var saved = null;
          try { saved = localStorage.getItem('modu-admin-site_no'); } catch(_){}
          window.ADMIN_SITE_NO = saved || DEFAULT_ADMIN_SITE_NO;
          if (!saved) { try { localStorage.setItem('modu-admin-site_no', DEFAULT_ADMIN_SITE_NO); } catch(_){} }
        }
      } catch(e) { window.ADMIN_SITE_NO = DEFAULT_ADMIN_SITE_NO; }
      /* ADMIN_SITE_NO 기준 CSS 로드 */
      document.write('<link rel="stylesheet" href="assets/css/adminGlobalStyle' + window.ADMIN_SITE_NO + '.css">');
    })();
    /* 다른 탭에서 SITE_NO 변경 시 자동 반영 */
    window.addEventListener('storage', function(e){
      if ((e.key === 'modu-admin-site_no' || e.key === 'modu-front-site_no') && e.newValue !== e.oldValue) {
        location.reload();
      }
    });
  </script>

    #_boot_loading .spin { width:44px; height:44px; border-radius:50%;

    #_boot_loading .txt { font-size:14px; color:#cfd3dc; letter-spacing:0.02em; font-weight:500; }
