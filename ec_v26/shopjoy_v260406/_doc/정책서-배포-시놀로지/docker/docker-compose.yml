# ═══════════════════════════════════════════════════════════
#  ShopJoy EcAdminApi - Docker Compose
# ═══════════════════════════════════════════════════════════
#  배치 위치: _apps/EcAdminApi/docker-compose.yml
#  실행 명령: docker compose up -d --build
# ═══════════════════════════════════════════════════════════

services:
  ecadminapi:
    # ───── 빌드 설정 ─────
    # context: Dockerfile이 있는 위치 기준 (현재 디렉터리)
    build:
      context: .
      dockerfile: Dockerfile

    # 빌드된 이미지 태그
    image: shopjoy/ecadminapi:latest

    # ───── 컨테이너 식별 ─────
    container_name: 210-ecadminApi

    # ───── 환경변수 ─────
    # .env 파일을 자동으로 읽어 컨테이너에 주입
    env_file:
      - .env

    # 인라인 환경변수 (.env 보다 우선순위 높음)
    environment:
      JAVA_OPTS: "-Xms256m -Xmx1024m"

    # ───── 포트 매핑 (호스트:컨테이너) ─────
    ports:
      - "21080:3000"   # HTTP API

    # ───── 볼륨 마운트 ─────
    # 로그를 호스트에 보관하여 컨테이너 삭제 시에도 보존
    volumes:
      - /volume1/docker/ecadminapi/logs:/app/logs

    # ───── 재시작 정책 ─────
    # unless-stopped: NAS 재부팅 시 자동 시작 (수동 정지한 경우 제외)
    restart: unless-stopped

    # ───── Health Check ─────
    # Dockerfile에 정의된 것을 오버라이드 가능
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/actuator/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

    # ───── 로그 드라이버 (디스크 보호) ─────
    logging:
      driver: "json-file"
      options:
        max-size: "10m"   # 단일 로그 파일 최대 크기
        max-file: "5"     # 보관할 로그 파일 개수

# ───── 네트워크 (선택) ─────
networks:
  default:
    name: shopjoy-net
