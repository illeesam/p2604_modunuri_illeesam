    /* ═══════════════════════════════════════════════════════════════════
       사이트 기본값 설정 (변경 시 이 한 줄만 수정)
       ═══════════════════════════════════════════════════════════════════ */
    const DEFAULT_BO_SITE_NO = '01';
    /* BO_SITE_NO — URL ?SITE_NO=02 로 오버라이드 가능, localStorage 영속 */
    (function(){
      try {
        var qs = new URLSearchParams(window.location.search);
        var v = qs.get('SITE_NO');
        if (v) {
          window.BO_SITE_NO = v;
          try { localStorage.setItem('modu-bo-site_no', v); } catch(_){}
          try {
            qs.delete('SITE_NO');
            var newSearch = qs.toString();
            history.replaceState(null, '', window.location.pathname + (newSearch ? '?' + newSearch : '') + window.location.hash);
          } catch(_){}
        } else {
          var saved = null;
          try { saved = localStorage.getItem('modu-bo-site_no'); } catch(_){}
          window.BO_SITE_NO = saved || DEFAULT_BO_SITE_NO;
          if (!saved) { try { localStorage.setItem('modu-bo-site_no', DEFAULT_BO_SITE_NO); } catch(_){} }
        }
      } catch(e) { window.BO_SITE_NO = DEFAULT_BO_SITE_NO; }
      /* BO_SITE_NO 기준 CSS 로드 */
      document.write('<link rel="stylesheet" href="assets/css/boGlobalStyle' + window.BO_SITE_NO + '.css">');
    })();
    /* 다른 탭에서 SITE_NO 변경 시 자동 반영 */
    window.addEventListener('storage', function(e){
      if (e.key === 'modu-bo-site_no' && e.newValue !== e.oldValue) {
        location.reload();
      }
    });
    /* 개발 시 기본 페이지 자동 이동 */
    (function(){
      if (!window.location.hash) {
        window.location.hash = '#page=zdStore';
      }
    })();
  </script>
