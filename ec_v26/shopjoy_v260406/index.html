  <script>
    /* ── 프론트 사이트 번호 (URL ?FRONT_SITE_NO=02 로 오버라이드 가능) ── */
    /* /index.html → / 로 단축 (해시/쿼리는 유지) */
    (function(){
      try {
        var p = window.location.pathname;
        if (/\/index\.html$/i.test(p)) {
          var newPath = p.replace(/index\.html$/i, '');
          history.replaceState(null, '', newPath + window.location.search + window.location.hash);
        }
      } catch(_){}
    })();
    (function(){
      var def = '01';
      try {
        var qs = new URLSearchParams(window.location.search);
        var v = qs.get('FRONT_SITE_NO');
        if (v) {
          window.FRONT_SITE_NO = v;
          try { localStorage.setItem('FRONT_SITE_NO', v); } catch(_){}
          /* URL에서 ?FRONT_SITE_NO=... 제거 (해시는 유지) */
          try {
            qs.delete('FRONT_SITE_NO');
            var newSearch = qs.toString();
            history.replaceState(null, '', window.location.pathname + (newSearch ? '?' + newSearch : '') + window.location.hash);
          } catch(_){}
        } else {
          var saved = null;
          try { saved = localStorage.getItem('FRONT_SITE_NO'); } catch(_){}
          window.FRONT_SITE_NO = saved || def;
        }
      } catch(e) { window.FRONT_SITE_NO = def; }
    })();
    document.write('<link rel="stylesheet" href="assets/css/frontOfficeStyle' + window.FRONT_SITE_NO + '.css">');
    document.write('<link rel="stylesheet" href="assets/cdn/pkg/tailwind/3.4.19.build/tailwind.min.css">');
  </script>
