  <!-- в–  H2.1: Site Config & Init Scripts в–  -->
  <script>
    /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
       мӮ¬мқҙнҠё кё°ліёк°’ м„Өм • (ліҖкІҪ мӢң мқҙ н•ң мӨ„л§Ң мҲҳм •)
       в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
    const DEFAULT_FO_SITE_NO = '01';

    /* /index.html вҶ’ / лЎң лӢЁм¶• (н•ҙмӢң/мҝјлҰ¬лҠ” мң м§Җ) */
    (function(){
      try {
        var p = window.location.pathname;
        if (/\/index\.html$/i.test(p)) {
          var newPath = p.replace(/index\.html$/i, '');
          history.replaceState(null, '', newPath + window.location.search + window.location.hash);
        }
      } catch(_){}
    })();
    /* FO_SITE_NO вҖ” URL ?SITE_NO=02 лЎң мҳӨлІ„лқјмқҙл“ң к°ҖлҠҘ */
    (function(){
      try {
        /* кө¬ нӮӨ(м–ёлҚ”мҠӨмҪ”м–ҙ) вҶ’ мӢ  нӮӨ(м№ҙл©ң) л§Ҳмқҙк·ёл Ҳмқҙм…ҳ */
        var _oldNo = localStorage.getItem('modu-fo-site_no');
        if (_oldNo && !localStorage.getItem('modu-fo-siteNo')) localStorage.setItem('modu-fo-siteNo', _oldNo);
        if (localStorage.getItem('modu-fo-site_no')) localStorage.removeItem('modu-fo-site_no');
      } catch(_){}
      var _toSiteId = function(no){ return 'SITE' + String(no || '01').padStart(6, '0'); };
      try {
        var qs = new URLSearchParams(window.location.search);
        var v = qs.get('SITE_NO');
        if (v) {
          window.FO_SITE_NO = v;
          try {
            qs.delete('SITE_NO');
            var newSearch = qs.toString();
            history.replaceState(null, '', window.location.pathname + (newSearch ? '?' + newSearch : '') + window.location.hash);
          } catch(_){}
        } else {
          var saved = null;
          try { saved = localStorage.getItem('modu-fo-siteNo'); } catch(_){}
          window.FO_SITE_NO = saved || DEFAULT_FO_SITE_NO;
        }
        /* м№ҙл©ң нӮӨлЎң н•ӯмғҒ мҳҒмҶҚнҷ” (лЎңк·ёмқё/м ‘мҶҚл§Ң н•ҙлҸ„ modu-fo-siteNo / modu-fo-siteId мғқм„ұ) */
        try {
          localStorage.setItem('modu-fo-siteNo', window.FO_SITE_NO);
          localStorage.setItem('modu-fo-siteId', _toSiteId(window.FO_SITE_NO));
        } catch(_){}
      } catch(e) { window.FO_SITE_NO = DEFAULT_FO_SITE_NO; }
      /* BO_SITE_NOлҠ” bo.htmlм—җм„ң м „м ҒмңјлЎң кҙҖлҰ¬ вҖ” FOм—җм„ң м ‘к·ј кёҲм§Җ */
    })();
    document.write('<link rel="stylesheet" href="assets/css/foGlobalStyle' + window.FO_SITE_NO + '.css">');
    /* лӢӨлҘё нғӯм—җм„ң SITE_NO ліҖкІҪ мӢң мһҗлҸҷ л°ҳмҳҒ */
    window.addEventListener('storage', function(e){
      if (e.key === 'modu-fo-siteNo' && e.newValue !== e.oldValue) {
        location.reload();
      }
    });
  </script>
