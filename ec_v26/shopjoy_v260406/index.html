  <script>
    /* ═══════════════════════════════════════════════════════════════════
       사이트 기본값 설정 (변경 시 이 한 줄만 수정)
       ═══════════════════════════════════════════════════════════════════ */
    const DEFAULT_FO_SITE_NO = '01';

    /* /index.html → / 로 단축 (해시/쿼리는 유지) */
    (function(){
      try {
        var p = window.location.pathname;
        if (/\/index\.html$/i.test(p)) {
          var newPath = p.replace(/index\.html$/i, '');
          history.replaceState(null, '', newPath + window.location.search + window.location.hash);
        }
      } catch(_){}
    })();
    /* FO_SITE_NO — URL ?FO_SITE_NO=02 로 오버라이드 가능 */
    (function(){
      try {
        var qs = new URLSearchParams(window.location.search);
        var v = qs.get('FO_SITE_NO');
        if (v) {
          window.FO_SITE_NO = v;
          try { localStorage.setItem('modu-fo-site_no', v); } catch(_){}
          try {
            qs.delete('FO_SITE_NO');
            var newSearch = qs.toString();
            history.replaceState(null, '', window.location.pathname + (newSearch ? '?' + newSearch : '') + window.location.hash);
          } catch(_){}
        } else {
          var saved = null;
          try { saved = localStorage.getItem('modu-fo-site_no'); } catch(_){}
          window.FO_SITE_NO = saved || DEFAULT_FO_SITE_NO;
        }
      } catch(e) { window.FO_SITE_NO = DEFAULT_FO_SITE_NO; }
      /* BO_SITE_NO 기본값은 bo.html에서 전적으로 관리. fo 진입 시 저장된 값만 읽음 (덮어쓰지 않음) */
      try {
        var savedA = null;
        try { savedA = localStorage.getItem('modu-bo-site_no'); } catch(_){}
        window.BO_SITE_NO = savedA || '';
      } catch(e) { window.BO_SITE_NO = ''; }
    })();
    document.write('<link rel="stylesheet" href="assets/css/foGlobalStyle' + window.FO_SITE_NO + '.css">');
    /* 다른 탭에서 SITE_NO 변경 시 자동 반영 */
    window.addEventListener('storage', function(e){
      if ((e.key === 'modu-fo-site_no' || e.key === 'modu-bo-site_no') && e.newValue !== e.oldValue) {
        location.reload();
      }
    });
  </script>

  <style>

    #_boot_loading .spin { width:44px; height:44px; border-radius:50%;
      border:3px solid rgba(255,255,255,0.12); border-top-color:#e8587a;
      animation:_bootspin .8s linear infinite; }
    #_boot_loading .txt { font-size:14px; color:#cfd3dc; letter-spacing:0.02em; font-weight:500; }
    @keyframes _bootspin { to { transform: rotate(360deg); } }
    #_boot_loading.done { opacity:0; transition:opacity .25s; pointer-events:none; }
